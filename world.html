        .home-btn:hover {

            border: none;
            background: none;
            padding: 8px 0;
            font-size: 0.82rem;
            font-weight: bold;
            color: #57606f;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.2s;

        .mode-btn.active {

        }

            align-items: center;

            justify-content: space-between;
            margin-bottom: 10px;
            gap: 10px;
        }
        .util-btn {
            background-color: #747d8c;
            color: white;
            border: none;
            padding: 7px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .util-btn:active { transform: scale(0.97); }

            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #score-badge { background-color: #ffe0e3; color: #ff4757; }

            background: #f1f2f6;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            color: #2f3542;
        }

        #map-container {
            width: 100%;
            height: 550px;
            border: 1px solid #f1f2f6;
            border-radius: 12px;
            overflow: hidden;
            background: #a5d5e8;
        }

        .country {
            fill: #f1f2f6 !important;
            stroke: #cbd5e1 !important;
            stroke-width: 0.4px !important;
            cursor: pointer;
            transition: fill 0.15s ease, stroke 0.15s ease;
        }
        .country:hover {
            fill: #94a3b8 !important;
        }
        .country.target-highlight {
            fill: #ff6b81 !important;
            stroke: #ff4757 !important;
            stroke-width: 1px !important;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .country.correct { cursor: default; }

            font-size: 9px;
            font-weight: bold;
            fill: #1e293b;
            pointer-events: none;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;

            border-radius: 20px;

    <div class="header-bar">

        <h1>세계 지도 정복 🌍</h1>
        <div style="width: 80px;"></div>
    </div>

    <div id="mode-selector-bar">
        <button id="btn-mode-normal" class="mode-btn active" onclick="confirmModeChange('normal')">일반</button>
        <button id="btn-mode-easy" class="mode-btn" onclick="confirmModeChange('easy')">Easy (선다)</button>
        <button id="btn-mode-random" class="mode-btn" onclick="confirmModeChange('random')">Random</button>
        <button id="btn-mode-infinite" class="mode-btn" onclick="confirmModeChange('infinite')">무한 모드 ∞</button>
    </div>

    <div id="game-container">
        <div id="save-load-bar">
            <button class="util-btn" id="btn-save-code" style="background-color: #34495e;">💾 현재 진행 세이브코드 생성</button>
            <button class="util-btn" id="btn-load-code" style="background-color: #e67e22;">📂 세이브코드로 이어하기</button>
        </div>

        <div id="info-panel">
            <div id="score-badge" class="badge">성공: <span id="score">0</span> / <span id="total-count">0</span></div>
            <div id="life-badge" class="badge">남은 기회: <span id="life-count">5</span>번</div>
        </div>

        <div id="random-prompt-box">
            🔴 깜빡이는 국가의 이름을 하단 창에 입력하세요! 
            <button class="util-btn" onclick="startRandomTurn()" style="padding:2px 8px; margin-left:5px; background:#ff4757;">문제 패스</button>
        </div>

        <div id="map-container"></div>

        <div id="quiz-choice-modal">
            <h3 id="quiz-choice-title">선택한 국가의 이름은 무엇일까요?</h3>
            <button class="choice-btn" onclick="submitChoice(0)"></button>
            <button class="choice-btn" onclick="submitChoice(1)"></button>
            <button class="choice-btn" onclick="submitChoice(2)"></button>
            <button class="choice-btn" onclick="submitChoice(3)"></button>
        </div>

        <div id="game-over-modal">
            <h2>GAME OVER 🚫</h2>
            <div id="final-result-text">기회를 모두 소진했습니다!</div>
            <button class="btn btn-blue" id="share-url-btn">↗️ 내 기록 친구에게 공유</button>
            <button class="btn btn-green" id="save-img-btn">💾 내 지도 이미지 저장</button>
            <button class="btn btn-gray" onclick="location.reload()">다시 도전하기</button>
            <a href="index.html" class="btn btn-gray" style="text-decoration:none; display:inline-block; line-height:2.2;">🏠 메인 메뉴로 나가기</a>
        </div>

            "Saint Kitts and Nevis": "세인트키츠 네비스", "Mauritius": "모리셔스", "New Caledonia": "뉴칼레도니아",
            "Puerto Rico": "푸에르토리코", "French Polynesia": "프랑스령 폴리네시아", "Solomon Islands": "솔로몬 제도",
            "São Tomé and Principe": "상투메 프린시페", "Seychelles": "세이셸", "Turks and Caicos Islands": "터크스 케이커스 제도",
            "Tonga": "통가", "Trinidad and Tobago": "트리니다드 토바고", "United States Virgin Islands": "미국령 버진아일랜드",
            "Vanuatu": "바누아투", "Samoa": "사모아", "Canary Islands (Spain)": "카나리아 제도", "Guadeloupe": "과들루프", "Fiji": "피지",
            "Saint Vincent and the Grenadines": "세인트빈센트 그레나딘", "Martinique": "마르티니크", "Bermuda": "버뮤다",
            "British Virgin Islands": "영국령 버진아일랜드", "French Guiana": "프랑스령 기아나", "Saint Lucia": "세인트루시아",
            "Antigua and Barbuda": "안티구아 바부다", "Mayotte": "마요트", "Saint Martin": "생마르탱", "Aruba": "아루바", "Tuvalu": "투발루"
        };


        // 🔍 SVG 국가 조각을 오차 없이 감지하는 1:1 매핑 및 데이터 정제 함수
        function parseCountryTag(path) {
            const rawId = (path.getAttribute('id') || '').trim();
            const rawClass = (path.getAttribute('class') || '').trim();
            const rawName = (path.getAttribute('name') || '').trim();

            const candidateKeys = [rawId, rawClass, rawName];

            for (let val of candidateKeys) {
                if (!val) continue;

                // 대문자 원본 확인 (예: ISO 코드 BS, AS)
                if (exactCountryMap[val]) {
                    return { key: val, display: exactCountryMap[val] };
                }

                // 대문자 변환 후 확인
                if (exactCountryMap[val.toUpperCase()]) {
                    return { key: val.toUpperCase(), display: exactCountryMap[val.toUpperCase()] };
                }

                // 소문자 변환 후 확인 (오타, 소문자, '성에우스statius' 등 처리)
                const lowerVal = val.toLowerCase();
                if (exactCountryMap[lowerVal]) {
                    return { key: lowerVal, display: exactCountryMap[lowerVal] };
                }
            }

            // 예외: 북한("Dem. Rep. Korea" 등) / 대한민국 별도 보정
            if (rawName.includes("Korea") || rawClass.includes("Korea")) {
                if (rawName.includes("Dem") || rawClass.includes("North") || rawId === "KP") {
                    return { key: "KP", display: "북한" };
                }
                return { key: "KR", display: "대한민국" };
            }

            const fallback = rawName || rawClass || rawId || "미확인 지역";
            return { key: fallback, display: fallback };
        }

        fetch('world.svg')
            .then(response => {
                if(!response.ok) throw new Error("world.svg 로드 실패");
                return response.text();
            })
            .then(svgText => {
                mapContainer.innerHTML = svgText;
                globalSvg = mapContainer.querySelector('svg');

                if (!globalSvg) {
                    mapContainer.innerHTML = `<div style="padding:20px; text-align:center; color:red;">⚠️ world.svg 내부 구조가 유효하지 않습니다.</div>`;
                    return;
                }

                globalSvg.setAttribute('width', '100%');
                globalSvg.setAttribute('height', '100%');

                const paths = globalSvg.querySelectorAll('path, polygon');

                paths.forEach((path) => {
                    const info = parseCountryTag(path);
                    const uniqueKey = info.key;
                    const displayName = info.display;

                    path.classList.add('country');
                    path.setAttribute('data-unique-key', uniqueKey);
                    path.setAttribute('data-display-name', displayName);

                    if (!customRegionMap[uniqueKey]) customRegionMap[uniqueKey] = [];
                    customRegionMap[uniqueKey].push(path);
                });

                Object.keys(customRegionMap).sort().forEach(key => cityIndexList.push(key));
                totalRegions = cityIndexList.length;
                totalCountDisplay.textContent = totalRegions;

                // 클릭 이벤트 연결
                cityIndexList.forEach(uniqueKey => {
                    const childPaths = customRegionMap[uniqueKey];
                    const displayName = childPaths[0].getAttribute('data-display-name');

                    childPaths.forEach(path => {
                        path.addEventListener('click', function() {
                            if (this.classList.contains('correct') || (lives <= 0 && gameMode !== 'infinite')) return;

                            if (gameMode === 'normal' || gameMode === 'infinite') {
                                handleNormalQuiz(uniqueKey, displayName);
                            } else if (gameMode === 'easy') {
                                handleEasyQuiz(uniqueKey, displayName);
                            } else if (gameMode === 'random') {
                                if (uniqueKey === currentRandomTarget) handleNormalQuiz(uniqueKey, displayName);
                            }
                        });
                    });
                });
            })
            .catch(err => {
                mapContainer.innerHTML = `<div style="padding:20px; text-align:center; color:red;">⚠️ world.svg 파일을 찾을 수 없습니다.<br>동일 폴더에 world.svg 파일이 위치했는지 확인해 주세요.</div>`;
            });

        function confirmModeChange(targetMode) {
            if (gameMode === targetMode) return;
            const userConfirm = confirm("⚠️ 경고: 모드를 변경하면 지금까지 플레이하던 정답 상황이 모두 사라지고 초기화됩니다!\n\n현재 진행 상태를 세이브코드로 저장하셨나요?");
            if (userConfirm) {
                resetGameState();
                applyGameMode(targetMode);
            }
        }

        function resetGameState() {
            choiceModal.style.display = 'none';
            if (currentRandomTarget && customRegionMap[currentRandomTarget]) {
                customRegionMap[currentRandomTarget].forEach(p => p.classList.remove('target-highlight'));
            }
            const labels = globalSvg.querySelectorAll('.area-label');
            labels.forEach(l => l.remove());

            cityIndexList.forEach(key => {
                customRegionMap[key].forEach(p => {
                    p.classList.remove('correct', 'target-highlight');
                    p.style.removeProperty('fill');
                });
            });

            Object.keys(choiceCache).forEach(k => delete choiceCache[k]);
            correctCount = 0;
            scoreDisplay.textContent = correctCount;
            lives = 5;
            lifeDisplay.textContent = lives;
            currentRandomTarget = null;
        }

        function applyGameMode(targetMode) {
            gameMode = targetMode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtnId = `btn-mode-${gameMode}`;
            if(document.getElementById(activeBtnId)) document.getElementById(activeBtnId).classList.add('active');

            if (gameMode === 'infinite') {
                lifeDisplay.textContent = "∞";
                randomBox.style.display = 'none';
            } else if (gameMode === 'random') {
                lifeDisplay.textContent = lives;
                randomBox.style.display = 'block';
                startRandomTurn();
            } else {
                lifeDisplay.textContent = lives;
                randomBox.style.display = 'none';
            }
        }

        function handleNormalQuiz(uniqueKey, displayName) {
            const userAnswer = prompt(`이 국가의 이름은 무엇일까요?`);
            if (!userAnswer) return;
            const trimmedUser = userAnswer.trim();

            if (trimmedUser === "정답다내놔") {
                triggerCheatKey(globalSvg); return;
            }

            if (trimmedUser === displayName) {
                alert(`정답입니다! 🎉 [${displayName}]`);
                processCorrectAnswer(globalSvg, uniqueKey, displayName);
                if (gameMode === 'random') startRandomTurn();
            } else {
                handleWrongAnswer(uniqueKey, displayName);
            }
        }

        function handleEasyQuiz(uniqueKey, displayName) {
            currentEasyActiveCity = uniqueKey;
            choiceModal.style.display = 'flex';

            if (!choiceCache[uniqueKey]) {
                const wrongCandidates = cityIndexList
                    .map(key => customRegionMap[key][0].getAttribute('data-display-name'))
                    .filter(name => name !== displayName);

                const selectedWrong = [];
                while (selectedWrong.length < 3) {
                    const randName = wrongCandidates[Math.floor(Math.random() * wrongCandidates.length)];
                    if (!selectedWrong.includes(randName)) selectedWrong.push(randName);
                }

                choiceCache[uniqueKey] = [displayName, ...selectedWrong].sort(() => Math.random() - 0.5);
            }

            currentChoices = choiceCache[uniqueKey];
            const buttons = choiceModal.querySelectorAll('.choice-btn');
            buttons.forEach((btn, index) => {
                btn.textContent = `${index + 1}. ${currentChoices[index]}`;
            });
        }

        function submitChoice(selectedIndex) {
            const selectedAnswer = currentChoices[selectedIndex];
            const activeKey = currentEasyActiveCity;
            const correctAnswerName = customRegionMap[activeKey][0].getAttribute('data-display-name');

            choiceModal.style.display = 'none';

            if (selectedAnswer === correctAnswerName) {
                alert(`정답입니다! 🎉 [${correctAnswerName}]`);
                processCorrectAnswer(globalSvg, activeKey, correctAnswerName);
            } else {
                handleWrongAnswer(activeKey, correctAnswerName);
            }
        }

        function handleWrongAnswer(uniqueKey, displayName) {
            if (gameMode === 'infinite') {
                alert(`아쉽게도 틀렸습니다!\n(힌트: 첫 글자는 '${displayName.substring(0, 1)}')`);
                return;
            }
            lives--;
            lifeDisplay.textContent = lives;
            alert(`틀렸습니다! 남은 기회: ${lives}번\n(힌트: 첫 글자는 '${displayName.substring(0, 1)}')`);
            if (lives <= 0) triggerGameOver();
            else if (gameMode === 'random') startRandomTurn();
        }

        function startRandomTurn() {
            if (currentRandomTarget && customRegionMap[currentRandomTarget]) {
                customRegionMap[currentRandomTarget].forEach(p => p.classList.remove('target-highlight'));
            }
            const remainingCities = cityIndexList.filter(key => !customRegionMap[key][0].classList.contains('correct'));
            if (remainingCities.length === 0) {
                alert("축하합니다! 전 세계 정복을 완료하셨습니다!"); return;
            }
            currentRandomTarget = remainingCities[Math.floor(Math.random() * remainingCities.length)];
            customRegionMap[currentRandomTarget].forEach(p => p.classList.add('target-highlight'));
        }

        function processCorrectAnswer(svgParent, uniqueKey, displayName) {
            const childPaths = customRegionMap[uniqueKey];
            if (!childPaths || childPaths[0].classList.contains('correct')) return;

            childPaths.forEach(p => p.classList.remove('target-highlight'));

            const finalColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];

            childPaths.forEach(p => {
                p.classList.add('correct');
                p.style.setProperty('fill', finalColor, 'important');
            });

            correctCount++;
            scoreDisplay.textContent = correctCount;
            const repPath = childPaths[Math.floor(childPaths.length / 2)];
            drawMiniLabel(svgParent, repPath, displayName);
        }

        document.getElementById('btn-save-code').addEventListener('click', () => {
            if (correctCount === 0 && lives === 5 && gameMode === 'normal') {
                alert("저장할 데이터가 없습니다!"); return;
            }
            let binaryString = modeCodes[gameMode] + lives.toString();
            cityIndexList.forEach(key => {
                const paths = customRegionMap[key];
                binaryString += (paths && paths[0].classList.contains('correct')) ? "1" : "0";
            });
            try {
                const hexaSaveCode = btoa(unescape(encodeURIComponent(binaryString)));
                navigator.clipboard.writeText(hexaSaveCode).then(() => {
                    alert(`현재 세이브코드가 복사되었습니다! 💾`);
                });
            } catch(e) { alert("세이브코드 생성 실패"); }
        });

        document.getElementById('btn-load-code').addEventListener('click', () => {
            const inputCode = prompt("세이브코드를 입력해 주세요.");
            if (!inputCode) return;
            try {
                const decodedString = decodeURIComponent(escape(atob(inputCode.trim())));
                let targetMode = codeToMode[decodedString.charAt(0)] || 'normal';
                let parsedLives = parseInt(decodedString.charAt(1));
                resetGameState();
                applyGameMode(targetMode);
                lives = parsedLives;
                if (gameMode !== 'infinite') lifeDisplay.textContent = lives;

                for (let i = 0; i < totalRegions; i++) {
                    if (decodedString.charAt(2 + i) === "1") {
                        const targetKey = cityIndexList[i];
                        const nameAttr = customRegionMap[targetKey][0].getAttribute('data-display-name');
                        processCorrectAnswer(globalSvg, targetKey, nameAttr);
                    }
                }
                alert(`🎮 복구 완료!`);
            } catch(error) { alert("⚠️ 손상된 세이브코드입니다."); }
        });

        function triggerGameOver() {
            choiceModal.style.display = 'none';
            if (currentRandomTarget) customRegionMap[currentRandomTarget].forEach(p => p.classList.remove('target-highlight'));
            modal.style.display = 'flex';
            document.getElementById('final-result-text').textContent = `최종 기록: ${totalRegions}개 중 ${correctCount}개 정복!`;
        }

        shareUrlBtn.addEventListener('click', () => {
            const currentUrl = window.location.href;
            const shareText = `세계 지도 정복 게임! 내 기록은 ${correctCount}개야! 🔥`;
            if (navigator.share) navigator.share({ title: '세계 지도 정복 게임 🌍', text: shareText, url: currentUrl });
            else navigator.clipboard.writeText(`${shareText}\n${currentUrl}`).then(() => alert("주소가 복사되었습니다! 📋"));
        });

        saveImgBtn.addEventListener('click', () => {
            saveImgBtn.textContent = "⚙️ 이미지 변환 중...";
            saveImgBtn.disabled = true;
            setTimeout(() => {
                html2canvas(mapContainer).then(canvas => {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `world_map_score_${correctCount}.png`;
                    a.click();
                    saveImgBtn.textContent = "💾 내 지도 이미지 저장";
                    saveImgBtn.disabled = false;
                });
            }, 100);
        });

        function triggerCheatKey(svgParent) {
            Object.keys(customRegionMap).forEach(key => { 
                const nameAttr = customRegionMap[key][0].getAttribute('data-display-name');
                processCorrectAnswer(svgParent, key, nameAttr); 
            });
            setTimeout(triggerGameOver, 500); 
        }

        function drawMiniLabel(svgParent, targetElement, text) {
            const bbox = targetElement.getBBox();
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", bbox.x + bbox.width / 2);
            textNode.setAttribute("y", bbox.y + bbox.height / 2);
            textNode.setAttribute("class", "area-label");
            textNode.setAttribute("text-anchor", "middle");
            textNode.setAttribute("dominant-baseline", "middle");
            textNode.textContent = text;
            svgParent.appendChild(textNode);
        }
    </script>
</body>
