<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지리 정복 게임 포털 🗺️</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            justify-content: center;
        }
        h1 {
            color: #2f3542;
            margin-bottom: 10px;
            font-size: 2rem;
            text-align: center;
        }
        .subtitle {
            color: #747d8c;
            margin-bottom: 30px;
            font-size: 1rem;
            text-align: center;
        }
        .card-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 700px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 280px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
            border-color: #3498db;
        }
        .card-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2f3542;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 0.9rem;
            color: #747d8c;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .play-btn {
            background: #3498db;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <h1>🗺️ 지도 정복 게임 포털</h1>
    <div class="subtitle">도전하고 싶은 게임을 선택하세요!</div>

    <div class="card-container">
        <!-- 🇰🇷 한국 지도 게임 카드 -->
        <a href="korea.html" class="game-card">
            <div class="card-icon">🇰🇷</div>
            <div class="card-title">전국 시·군 정복</div>
            <div class="card-desc">대한민국 200여 개 시·군 구역을 채워보세요!</div>
            <div class="play-btn">게임 시작하기</div>
        </a>

        <!-- 🌍 세계 지도 게임 카드 -->
        <a href="world.html" class="game-card">
            <div class="card-icon">🌍</div>
            <div class="card-title">세계 국기/나라 정복</div>
            <div class="card-desc">전 세계 주요 국가들의 위치와 이름을 맞춰보세요!</div>
            <div class="play-btn" style="background: #2ed573;">게임 시작하기</div>
        </a>
    </div>

</body>
</html>
