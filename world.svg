<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
    <style>
        .country {
            fill: #f1f2f6;
            stroke: #cbd5e1;
            stroke-width: 0.5px;
            cursor: pointer;
            transition: fill 0.15s ease, stroke 0.15s ease;
        }
        .country:hover {
            fill: #94a3b8 !important;
        }
        .country.target-highlight {
            fill: #ff6b81 !important;
            stroke: #ff4757 !important;
            stroke-width: 1px !important;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .country.correct { cursor: default; }
    </style>
